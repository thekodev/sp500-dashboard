name: Daily S&P 500 Analysis

on:
  workflow_dispatch: # Manual trigger only

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run stock analysis (parallel)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -c "
          import analyzer
          import os, time, subprocess

          # Run with 5 parallel workers
          analyzer.run_full_analysis(max_workers=5)

          # Commit & push results
          subprocess.run(['git', 'add', 'data/'], check=True)
          result = subprocess.run(['git', 'diff', '--staged', '--quiet'])
          if result.returncode != 0:
              subprocess.run(['git', 'commit', '-m', 'Update S&P 500 analysis'], check=True)
              subprocess.run(['git', 'pull', '--rebase'], check=False)
              subprocess.run(['git', 'push'], check=True)
              print('Pushed results!')
          else:
              print('No changes to commit')
          "

      - name: Final commit and push
        run: |
          git add data/
          git diff --staged --quiet || git commit -m "Update S&P 500 analysis $(date +%Y-%m-%d)"
          git pull --rebase || true
          git push || true
